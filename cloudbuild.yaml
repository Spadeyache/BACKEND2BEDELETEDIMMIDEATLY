substitutions:
  _REGION: us-east1
  _SERVICE: veara-backend
  _IMAGE_BASE: us-east1-docker.pkg.dev/project-4e3ae124-305e-478e-be4/cloud-run-source-deploy/veara-backend
  # Secret Manager secret holding the full production .env file.
  # Mounted into the container at /var/www/html/.env at runtime.
  _ENV_SECRET: veara-backend-env

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "${_IMAGE_BASE}:$SHORT_SHA"
      - "."

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_IMAGE_BASE}:$SHORT_SHA"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image"
      - "${_IMAGE_BASE}:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - managed
      # nginx in the container listens on 8080 (docker/nginx.conf).
      - "--port"
      - "8080"
      # Public API + admin login: reachable without IAM auth.
      - "--allow-unauthenticated"
      # Laravel + nginx + php-fpm + supervisor; 512Mi/1cpu is comfortable.
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      # Cold start runs migrate --force; give it headroom.
      - "--timeout"
      - "300"
      # Mount the whole production .env from Secret Manager as a file.
      # All credentials (DB, Supabase, Stripe, Printify, JWT, etc.) live here,
      # so nothing sensitive is set as a plain Cloud Run env var.
      - "--set-secrets"
      - "/var/www/html/.env=${_ENV_SECRET}:latest"
      - "--quiet"

images:
  - "${_IMAGE_BASE}:$SHORT_SHA"
