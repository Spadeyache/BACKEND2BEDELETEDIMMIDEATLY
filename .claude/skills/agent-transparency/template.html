<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script id="activity-data" type="application/json">
{

  "plan": {

    "assumptions": [

      "60 requests per minute per IP is a reasonable default; you can override it."
    ],
    "openQuestions": [
      "Should authenticated users bypass the limit, or get a higher ceiling? I assumed a higher ceiling but did not implement bypass yet.",
      "Do you run more than one instance behind a load balancer? If so, in-process counting will under-count and we need Redis."
    ],
    "steps": [
      { "id": "s1", "title": "Read router and existing middleware patterns", "status": "done", "note": "Followed the convention in middleware/auth.js" },
      { "id": "s2", "title": "Add token-bucket limiter module", "status": "done", "note": "" },
      { "id": "s3", "title": "Wire limiter into /search route", "status": "active", "note": "" },
      { "id": "s4", "title": "Add tests for limit and 429 response shape", "status": "pending", "note": "" },
      { "id": "s5", "title": "Document env vars in README", "status": "pending", "note": "" }

  "changes": [

      "added": 48,
      "removed": 0,
      "risk": "low",

      "why": "Isolating the limiter in its own module keeps the route handler clean and makes it reusable for other endpoints later."

    {
      "file": "src/routes/search.js",
      "action": "edit",
      "added": 3,
      "removed": 0,
      "risk": "medium",

      "why": "Placing it at the router boundary means every code path into /search is covered, including ones added in future."

    }

  "commands": [
    { "cmd": "npm test -- search", "purpose": "Confirm existing search tests still pass before adding limits", "result": "ok" },
    { "cmd": "node -e \"require('./src/middleware/rateLimit')\"", "purpose": "Smoke-check the new module loads", "result": "ok" }
  ],

  "log": [
    { "t": "09:31", "kind": "plan", "text": "Framed the task as a per-IP token bucket at the router boundary. Surfaced two open questions before writing code." },
    { "t": "09:36", "kind": "decision", "text": "Chose in-process state over Redis for now, since no cache dependency exists yet. Flagged as the main scaling risk." },
    { "t": "09:38", "kind": "edit", "text": "Wrote rateLimit.js following the auth middleware shape." },
    { "t": "09:41", "kind": "command", "text": "Ran search tests as a baseline, green before I touch the route." },
    { "t": "09:42", "kind": "edit", "text": "Mounting limiter into the search router now." }
  ],

  "recap": {
    "summary": "",
    "review": [],

}
</script>

<style>
:root{
  --paper:#FBF9F4;          /* warm off-white canvas */
  --paper-2:#F4F0E8;        /* subtle warm fill */
  --surface:#FFFFFF;
  --line:#E8E2D6;           /* warm hairline */
  --line-soft:#F0EBE1;
  --ink:#221F1A;            /* warm near-black */
  --ink-dim:#6F685B;
  --ink-faint:#A7A092;

  --papaya:#EC5F12;         /* McLaren papaya — the one attention accent */
  --papaya-strong:#D2520B;
  --papaya-soft:#FCE7D6;

  --green:#1E5038;          /* dark green — settled / done */
  --green-soft:#E1EBE3;

  --sakura:#E07A9B;         /* sakura — soft verbal / FYI register */
  --sakura-soft:#FAE6EC;

  --warn:#B07919;           /* ochre */
  --bad:#C24A5E;            /* rose-red, kin to sakura */

  --serif:"Fraunces",ui-serif,Georgia,serif;
  --mono:"DM Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1100px 460px at 88% -8%, #FFF6EC 0%, transparent 58%),
    radial-gradient(900px 420px at -5% 5%, #F1F4EE 0%, transparent 55%),
    var(--paper);
  color:var(--ink);
  font-family:var(--mono);
  font-size:13.5px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  padding:34px clamp(16px,5vw,64px) 88px;
}

/* ---- header ---- */
.head{display:flex;flex-wrap:wrap;gap:16px 28px;align-items:flex-end;
  padding-bottom:20px;border-bottom:1.5px solid var(--ink);margin-bottom:0}
.head .label{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--papaya-strong);font-weight:500}
.head h1{font-family:var(--serif);font-weight:600;font-size:clamp(24px,3.4vw,36px);
  line-height:1.1;letter-spacing:-.01em;margin:9px 0 0;max-width:24ch;color:var(--ink)}
.head .meta{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;padding:6px 13px;border-radius:100px;font-weight:500;border:1.5px solid}
.badge .dot{width:7px;height:7px;border-radius:50%}
.badge.s-planning{color:var(--sakura);border-color:var(--sakura);background:var(--sakura-soft)}.badge.s-planning .dot{background:var(--sakura)}
.badge.s-executing{color:var(--papaya-strong);border-color:var(--papaya);background:var(--papaya-soft)}.badge.s-executing .dot{background:var(--papaya);animation:pulse 1.5s infinite}
.badge.s-done{color:var(--green);border-color:var(--green);background:var(--green-soft)}.badge.s-done .dot{background:var(--green)}
.badge.s-blocked{color:#fff;border-color:var(--bad);background:var(--bad)}.badge.s-blocked .dot{background:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stamp{font-size:11px;color:var(--ink-faint)}

/* ---- at-a-glance bar ---- */
.glance{display:flex;flex-wrap:wrap;gap:0;border:1px solid var(--line);border-radius:8px;
  background:var(--surface);margin:24px 0 28px;overflow:hidden}
.gcell{flex:1 1 0;min-width:120px;padding:13px 18px;border-right:1px solid var(--line-soft)}
.gcell:last-child{border-right:0}
.gcell .gl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.gcell .gv{font-family:var(--serif);font-size:23px;font-weight:600;color:var(--ink);margin-top:3px;line-height:1}
.gcell .gv small{font-size:13px;color:var(--ink-faint);font-weight:400}
.gcell.alert{background:var(--papaya-soft)}
.gcell.alert .gl{color:var(--papaya-strong)}.gcell.alert .gv{color:var(--papaya-strong)}
.meter{height:5px;border-radius:100px;background:var(--paper-2);margin-top:9px;overflow:hidden}
.meter i{display:block;height:100%;background:var(--green);border-radius:100px}
.gv .add{color:var(--green)}.gv .rem{color:var(--bad)}

/* ---- layout ---- */
.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:26px}
@media(max-width:880px){.grid{grid-template-columns:1fr}}
.col{display:flex;flex-direction:column;gap:26px;min-width:0}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;
  box-shadow:0 1px 2px rgba(60,50,30,.03),0 8px 24px -16px rgba(60,50,30,.12)}
.panel > .ph{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line-soft)}
.ph .k{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);font-weight:500}
.ph .tag{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);
  margin-left:auto;padding:3px 8px;border:1px solid var(--line);border-radius:100px}
.ph .tag.verbal{color:var(--sakura);border-color:var(--sakura);background:var(--sakura-soft)}
.pb{padding:18px}

/* ---- verbal prose ---- */
.prose{font-family:var(--serif);font-size:16.5px;line-height:1.6;color:var(--ink);font-weight:400}
.prose.lede{font-size:18px}
.prose + .prose{margin-top:13px}
.sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);
  font-family:var(--mono);margin:20px 0 9px}
.flag{display:flex;gap:11px;padding:11px 14px;border-left:3px solid var(--line);
  background:var(--paper);border-radius:0 6px 6px 0;font-family:var(--serif);font-size:15px;line-height:1.5}
.flag + .flag{margin-top:8px}
.flag.assume{border-left-color:var(--green);background:var(--green-soft)}
.flag.question{border-left-color:var(--papaya);background:var(--papaya-soft)}
.flag .ic{font-family:var(--mono);font-size:10px;color:var(--ink-faint);flex:none;margin-top:4px;letter-spacing:.1em}
.flag.assume .ic{color:var(--green)}.flag.question .ic{color:var(--papaya-strong)}

/* ---- steps ---- */
.steps{list-style:none;margin:0;padding:0}
.step{display:flex;gap:13px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.step:last-child{border-bottom:0}
.step .mk{flex:none;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;font-size:11px;color:var(--ink-faint);margin-top:1px}
.step.done .mk{border-color:var(--green);color:#fff;background:var(--green)}
.step.active .mk{border-color:var(--papaya);color:var(--papaya);box-shadow:0 0 0 4px var(--papaya-soft)}
.step.skipped .mk{opacity:.45}
.step .body .t{color:var(--ink);font-size:13.5px}
.step.done .body .t{color:var(--ink-dim)}
.step.skipped .body .t{color:var(--ink-faint);text-decoration:line-through}
.step .note{font-family:var(--serif);font-size:14px;color:var(--ink-dim);margin-top:3px}

/* ---- changes ---- */
.change{padding:15px 0;border-bottom:1px solid var(--line-soft)}
.change:first-child{padding-top:0}.change:last-child{border-bottom:0}
.change .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.act{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 7px;border-radius:100px;flex:none;font-weight:500}
.act.create{color:var(--green);background:var(--green-soft)}
.act.edit{color:var(--warn);background:#F6EEDC}
.act.delete{color:var(--bad);background:var(--sakura-soft)}
.fname{color:var(--ink);font-size:12.5px;word-break:break-all}
.stat{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11.5px;flex:none}
.stat .add{color:var(--green)}.stat .rem{color:var(--bad)}
.bar{display:flex;gap:2px;margin-left:2px}
.bar i{width:6px;height:11px;border-radius:1px;background:var(--paper-2)}
.bar i.a{background:var(--green)}.bar i.r{background:var(--bad)}
.change .why{font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--ink-dim);margin-top:8px}
.change .why b{color:var(--ink);font-weight:600}
.risk{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-left:8px;white-space:nowrap}
.risk.medium{color:var(--warn)}.risk.high{color:var(--bad)}

/* ---- log timeline ---- */
.log{list-style:none;margin:0;padding:0;position:relative}
.log:before{content:"";position:absolute;left:52px;top:6px;bottom:6px;width:1.5px;background:var(--line-soft)}
.le{display:grid;grid-template-columns:44px 1fr;gap:16px;padding:8px 0;position:relative}
.le .ts{font-size:11px;color:var(--ink-faint);text-align:right;padding-top:2px}
.le .what{font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--ink-dim);position:relative;padding-left:20px}
.le .what:before{content:"";position:absolute;left:-5px;top:8px;width:9px;height:9px;border-radius:50%;background:var(--ink-faint);border:2.5px solid var(--surface)}
.le.plan .what:before{background:var(--sakura)}
.le.decision .what:before{background:var(--papaya)}
.le.edit .what:before{background:var(--warn)}
.le.command .what:before{background:var(--green)}
.le.blocked .what:before{background:var(--bad)}
.le .kind{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-right:9px}

/* ---- commands ---- */
.cmd{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft);align-items:baseline}
.cmd:last-child{border-bottom:0}
.cmd code{color:var(--ink);font-size:12px;word-break:break-all}
.cmd .p{font-family:var(--serif);font-size:13.5px;color:var(--ink-faint);margin-top:3px}
.res{margin-left:auto;flex:none;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:100px}
.res.ok{color:var(--green);background:var(--green-soft)}
.res.fail{color:#fff;background:var(--bad)}
.res.pending{color:var(--warn);background:#F6EEDC}

/* ---- recap ---- */
.check{list-style:none;margin:9px 0 0;padding:0}
.check li{display:flex;gap:11px;padding:8px 0;font-family:var(--serif);font-size:15.5px;border-bottom:1px solid var(--line-soft);line-height:1.45}
.check li:last-child{border-bottom:0}
.check li:before{content:"\2192";color:var(--papaya-strong);font-family:var(--mono);flex:none}
.notdone li:before{content:"\00d7";color:var(--bad)}

.empty{color:var(--ink-faint);font-family:var(--serif);font-style:italic;font-size:14.5px}
.foot{margin-top:36px;text-align:center;color:var(--ink-faint);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
.foot b{color:var(--papaya-strong);font-weight:500}

@media print{
  body{padding:0;background:#fff}
  .panel{box-shadow:none;break-inside:avoid}
  .badge.s-executing .dot{animation:none}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="foot">Agent Activity &middot; self-contained team report &middot; <b>auto-rendered from the data block</b></div>

<script>
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const has = (a)=>Array.isArray(a)&&a.length>0;

function diffBar(add,rem){
  const total=add+rem; if(!total) return '';
  const n=Math.min(5,Math.max(1,Math.round(total/8)));
  const greens=Math.max(add>0?1:0,Math.round(n*add/total));
  let s='<span class="bar">';
  for(let i=0;i<n;i++) s+='<i class="'+(i<greens?'a':'r')+'"></i>';
  return s+'</span>';
}

function render(){
  let D;
  try{ D=JSON.parse(document.getElementById('activity-data').textContent); }
  catch(e){ document.getElementById('app').innerHTML='<p class="empty">Could not parse the ACTIVITY data block — check for a trailing comma or unescaped quote. ('+esc(e.message)+')</p>'; return; }

  const status=(D.status||'planning').toLowerCase();
  const statusLabel={planning:'Planning',executing:'Executing',done:'Done',blocked:'Blocked'}[status]||status;
  const when=D.updated?new Date(D.updated):null;
  const whenStr=when&&!isNaN(when)?when.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):(D.updated||'');

  const app=document.getElementById('app');
  app.innerHTML='';

  app.appendChild($(
    '<div class="head">'+
      '<div>'+
        '<div class="label">Agent Activity'+(D.checkpoint!=null?' &middot; checkpoint '+esc(D.checkpoint):'')+'</div>'+
        '<h1>'+esc(D.task||'Untitled task')+'</h1>'+
      '</div>'+
      '<div class="meta">'+
        '<span class="badge s-'+status+'"><span class="dot"></span>'+esc(statusLabel)+'</span>'+
        (whenStr?'<span class="stamp">updated '+esc(whenStr)+'</span>':'')+
      '</div>'+
    '</div>'));

  // ---- at-a-glance bar (computed, no schema change) ----
  const P=D.plan||{};
  const steps=P.steps||[];
  const sdone=steps.filter(s=>s.status==='done').length;
  const pct=steps.length?Math.round(100*sdone/steps.length):0;
  const changes=D.changes||[];
  const added=changes.reduce((n,c)=>n+(c.added||0),0);
  const removed=changes.reduce((n,c)=>n+(c.removed||0),0);
  const oq=(P.openQuestions||[]).length;
  const cmds=D.commands||[];
  const failed=cmds.filter(c=>c.result==='fail').length;

  app.appendChild($(
    '<div class="glance">'+
      '<div class="gcell"><div class="gl">Progress</div><div class="gv">'+sdone+'<small> / '+steps.length+' steps</small></div><div class="meter"><i style="width:'+pct+'%"></i></div></div>'+
      '<div class="gcell"><div class="gl">Files touched</div><div class="gv">'+changes.length+'</div></div>'+
      '<div class="gcell"><div class="gl">Lines</div><div class="gv"><span class="add">+'+added+'</span> <span class="rem">&minus;'+removed+'</span></div></div>'+
      '<div class="gcell'+(oq>0?' alert':'')+'"><div class="gl">'+(oq>0?'Needs you':'Open questions')+'</div><div class="gv">'+oq+'<small> question'+(oq===1?'':'s')+'</small></div></div>'+
      '<div class="gcell'+(failed>0?' alert':'')+'"><div class="gl">Commands</div><div class="gv">'+cmds.length+(failed>0?'<small> &middot; '+failed+' failed</small>':'')+'</div></div>'+
    '</div>'));

  const grid=$('<div class="grid"></div>');
  const left=$('<div class="col"></div>');
  const right=$('<div class="col"></div>');
  grid.append(left,right); app.appendChild(grid);

  // ---- LEFT: verbal ----
  left.appendChild($(
    '<div class="panel">'+
      '<div class="ph"><span class="k">The plan, in plain words</span><span class="tag verbal">verbal</span></div>'+
      '<div class="pb">'+
        (P.intent?'<p class="prose lede">'+esc(P.intent)+'</p>':'')+
        (P.approach?'<p class="prose">'+esc(P.approach)+'</p>':'')+
        (!P.intent&&!P.approach?'<p class="empty">No plan written yet.</p>':'')+
        (has(P.assumptions)?'<div class="sub">Assumptions in play</div>'+P.assumptions.map(a=>'<div class="flag assume"><span class="ic">ASSUME</span><span>'+esc(a)+'</span></div>').join(''):'')+
        (has(P.openQuestions)?'<div class="sub">Open questions for you</div>'+P.openQuestions.map(q=>'<div class="flag question"><span class="ic">ASK</span><span>'+esc(q)+'</span></div>').join(''):'')+
      '</div>'+
    '</div>'));

  if(has(steps)){
    const panel=$('<div class="panel"><div class="ph"><span class="k">Steps</span><span class="tag">'+sdone+'/'+steps.length+'</span></div><div class="pb"><ul class="steps"></ul></div></div>');
    const ul=panel.querySelector('ul');
    steps.forEach(s=>{
      const st=(s.status||'pending');
      const mk={done:'\u2713',active:'\u25b8',skipped:'\u2013'}[st]||'';
      ul.appendChild($('<li class="step '+esc(st)+'"><span class="mk">'+mk+'</span><div class="body"><div class="t">'+esc(s.title||'')+'</div>'+(s.note?'<div class="note">'+esc(s.note)+'</div>':'')+'</div></li>'));
    });
    left.appendChild(panel);
  }

  if(has(D.log)){
    const lg=$('<div class="panel"><div class="ph"><span class="k">Decision log</span><span class="tag verbal">verbal</span></div><div class="pb"><ul class="log"></ul></div></div>');
    const ul=lg.querySelector('ul');
    D.log.forEach(e=>{
      ul.appendChild($('<li class="le '+esc(e.kind||'note')+'"><span class="ts">'+esc(e.t||'')+'</span><div class="what"><span class="kind">'+esc(e.kind||'note')+'</span>'+esc(e.text||'')+'</div></li>'));
    });
    left.appendChild(lg);
  }

  // ---- RIGHT: visual ----
  const ch=$('<div class="panel"><div class="ph"><span class="k">What changed on disk</span><span class="tag">'+(has(changes)?changes.length+' files':'visual')+'</span></div><div class="pb"></div></div>');
  const cb=ch.querySelector('.pb');
  if(has(changes)){
    changes.forEach(c=>{
      const a=c.added||0,r=c.removed||0,risk=(c.risk||'none');
      cb.appendChild($(
        '<div class="change">'+
          '<div class="top">'+
            '<span class="act '+esc(c.action||'edit')+'">'+esc(c.action||'edit')+'</span>'+
            '<span class="fname">'+esc(c.file||'')+'</span>'+
            '<span class="stat">'+(a?'<span class="add">+'+a+'</span>':'')+(r?'<span class="rem">\u2212'+r+'</span>':'')+diffBar(a,r)+'</span>'+
          '</div>'+
          (c.summary?'<div class="why"><b>'+esc(c.summary)+'</b></div>':'')+
          (c.why?'<div class="why">'+esc(c.why)+(risk!=='none'?' <span class="risk '+esc(risk)+'">risk: '+esc(risk)+'</span>':'')+'</div>':(risk!=='none'?'<div class="why"><span class="risk '+esc(risk)+'">risk: '+esc(risk)+'</span></div>':''))+
        '</div>'));
    });
  } else { cb.appendChild($('<p class="empty">No files touched yet.</p>')); }
  right.appendChild(ch);

  if(has(cmds)){
    const cm=$('<div class="panel"><div class="ph"><span class="k">Commands run</span><span class="tag">'+cmds.length+'</span></div><div class="pb"></div></div>');
    const b=cm.querySelector('.pb');
    cmds.forEach(c=>{
      const res=(c.result||'pending');
      b.appendChild($('<div class="cmd"><div><code>$ '+esc(c.cmd||'')+'</code>'+(c.purpose?'<div class="p">'+esc(c.purpose)+'</div>':'')+'</div><span class="res '+esc(res)+'">'+esc(res)+'</span></div>'));
    });
    right.appendChild(cm);
  }

  const R=D.recap||{};
  if(R.summary||has(R.review)||has(R.notDone)){
    const rc=$('<div class="panel"><div class="ph"><span class="k">Recap &amp; what to review</span><span class="tag verbal">verbal</span></div><div class="pb"></div></div>');
    const b=rc.querySelector('.pb');
    if(R.summary) b.appendChild($('<p class="prose lede">'+esc(R.summary)+'</p>'));
    if(has(R.review)){ b.appendChild($('<div class="sub">Please eyeball these</div>')); const ul=$('<ul class="check"></ul>'); R.review.forEach(x=>ul.appendChild($('<li>'+esc(x)+'</li>'))); b.appendChild(ul); }
    if(has(R.notDone)){ b.appendChild($('<div class="sub">Left undone on purpose</div>')); const ul=$('<ul class="check notdone"></ul>'); R.notDone.forEach(x=>ul.appendChild($('<li>'+esc(x)+'</li>'))); b.appendChild(ul); }
    right.appendChild(rc);
  }
}
render();
</script>
</body>
</html>
